# HOST PATHS - Edit these with your local paths
host_paths:
  raw_input_dir: "/home/roppert/work/data/Ms/P000010/15.11/"
  output_base_dir: "/home/roppert/work/pipeline_results"
  #template_path: "/home/roppert/work/mri_ai_service/mni_templates/mni_icbm152_t1_tal_nlin_sym_09a.nii"

# REMOTE PATHS - Optional: paths on the remote server (used with -r flag)
remote_paths:
  raw_input_dir: "/media/datasets1/SibBMS/MS"
  output_base_dir: "/media/storage/roppert/MS_preprocessed"
  #template_path: "/media/storage/roppert/brain_tumour_project/mni_templates/mni_icbm152_t1_tal_nlin_sym

# CONTAINER PATHS - Don't change these (they are fixed inside the Docker container)
paths:
  raw_input_dir: "/app/data/input"
  output_base_dir: "/app/data/output"
  template_path: "/app/mni_templates/mni_icbm152_t1_tal_nlin_sym_09a.nii"
  
  # Subdirectories inside the pipeline output
  subdirs:
    bids_dicom: "bids_data_dicom"
    dicom_checks: "dciodvfy_reports"
    dicom_meta: "dicom_metadata"
    bids_nifti: "bids_data_nifti"
    validation_reports: "validation_results"
    fast_qc_reports: "bids_quality_metrics"
    mriqc_output: "mriqc_output"
    mriqc_interpret: "mriqc_interpretation"
    transforms: "transformations"
    preprocessed: "preprocessed_data"
    segmentation_masks: "segmentation_masks"
    logs: "logs"

# Paths to executables (these are container paths)
executables:
  dciodvfy: "/usr/bin/dciodvfy"
  bids_validator: "/usr/local/bin/bids-validator"
  aiaa_server_url: "http://172.16.71.222:5000"

# Parameters for specific pipeline steps
steps:
  reorganize_folders:
    action: "copy"  # Possible values: "copy" (default), "move"
  dicom_standard_check: {}
  extract_metadata: {}
  convert_dicom_to_nifti: {}
  bids_validation: {}
  quality_metrics:
    anisotropy_thresh: 3.0
  mriqc:
    enabled: false                     # Main switch for MRIQC (true - run, false - skip completely)
    run_on_server: true               # If enabled=true: true - run on remote server, false - run locally
    run_on_server_auto_trigger: true  # If run_on_server=true: true - auto trigger, false - manual
    report_type: "participant"        # participant, group, or both
    n_procs: 1                        # Number of processes
    n_threads: 1                      # Number of threads per process
    mem_gb: 15                        # Memory limit in GB
  mriqc_interpretation:
    enabled: false
  preprocessing:
    keep_intermediate_files: false  
    intensity_normalization:
      enabled: false       
      method: "ZScore" # "HistogramMatching", "ZScore", or "WhiteStripe"
      # Parameters specific to HistogramMatching:
      histogram_levels: 1024
      match_points: 7
      # Parameters specific to ZScore:
      exclude_zeros: false  # Whether to exclude zeros from mean/std calculation
      # Parameters specific to WhiteStripe:
      n_sd: 2.5          # Width of the stripe
      threshold_at_zero: false  # Ignore zero voxels
    bias_field_correction:
      enabled: false    
      method: "N4BiasFieldCorrection"
      strategy: "ModalitySpecific"  # Options: "Standard", "ModalitySpecific", "T1Based"
      
      # Validation settings
      validate_correction: false 
      parallel_processing: true
      max_workers: 4
      
      sitk_shrinkFactor: 4
      sitk_numberOfIterations: [50, 50, 50, 50]
      sitk_convergenceThreshold: 0.001
      
      # Modality-specific parameters (used when strategy is "modality_specific")
      modality_specific_params:
        T1:
          shrink_factor: 4
          n_iterations: [50, 50, 50, 50]
          convergence_threshold: 0.001
          smoothing_factor: 0.15
          use_brain_mask: false
        T1CE: 
          shrink_factor: 4
          n_iterations: [50, 50, 30, 20]
          convergence_threshold: 0.001
          smoothing_factor: 0.20
          use_brain_mask: false
        T2:    
          shrink_factor: 4
          n_iterations: [50, 50, 50, 50]
          convergence_threshold: 0.001
          smoothing_factor: 0.15
          use_brain_mask: false
        FLAIR:
          shrink_factor: 3
          n_iterations: [60, 50, 40, 30]
          convergence_threshold: 0.0005
          smoothing_factor: 0.25
          use_brain_mask: false 
    registration:
      enabled: true  
      method: "ANTsPy"
      ants_transform_type: "SyN"
      template_path: "/app/mni_templates/mni_icbm152_t1_tal_nlin_sym_09a.nii"
    skull_stripping:
      enabled: true  
      method: "FSL_BET" # FSL_BET/Freesurfer
      bet_fractional_intensity_threshold: 0.5
      bet_robust: true
      wsthresh: 5     
      clean_bm: true 
      save_mask: true 
      border: 0
  segmentation:
    enabled: false      
    model_name: "Unet"
    modality_input_map:
      t1: "T1w"
      t1c: "ce-gd_T1w"
      t2: "T2w"
      flair: "FLAIR"

# Parameters for remote MRIQC execution on server
server_mriqc:
  ssh_user: "roppert"
  ssh_host: "bigdata.nsu.ru"
  remote_base_data_dir: "/media/storage/roppert/mriqc_pipeline_runs"
  remote_wrapper_script_path: "/media/storage/roppert/brain_tumour_project/run_mriqc_task_on_server.sh"
  mriqc_executable_path_on_server: "mriqc"
  monitoring_interval_seconds: 60
  monitoring_timeout_hours: 24
  delete_remote_task_dir_on_success: true
  delete_remote_task_dir_on_error: false
  cleanup_mriqc_work_dir_on_server_after_fix: true
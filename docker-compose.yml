services:

  # Web frontend + backend + preprocessing pipeline
  web:
    build:
      context: .
      dockerfile: web.Dockerfile
    image: brain-lesion-web:demo
    ports:
      - "8000:8000"
    environment:
      - SEGMENTATION_URL=http://service-gbm-seg:5000
      - FSLDIR=${FSLDIR:-/usr/local/fsl}
    volumes:
      - /home:/home:rw
      - ./demo_workspace:/workspace:rw
      - ./scripts:/app/scripts:ro
      - ./configs:/app/configs:rw
      - ./backend/data:/app/backend/data:rw
      # Mount the pipeline config so edits apply on `up` without an image
      # rebuild. web.Dockerfile bakes a copy in at build time; without this
      # mount the container keeps using the stale baked-in workers/settings.
      - ./pipeline_config.yaml:/app/pipeline_config.yaml:rw
    depends_on:
      - service-gbm-seg
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Memory safety cap: the pipeline (stages 01-08) runs in this container.
    # Without a limit, a heavy stage (e.g. Stage 04 quality at high worker
    # counts on large longitudinal datasets) exhausts all host RAM+swap and the
    # kernel OOM killer takes down the desktop. Capping here means an over-heavy
    # stage fails inside the container instead of crashing the OS.
    # memswap_limit == mem_limit disables container swap (no swap thrash).
    mem_limit: 20g
    memswap_limit: 20g
    profiles: ["full"]

  # GBM segmentation service (nnUNet v1, Task115)
  service-gbm-seg:
    build:
      context: ./services
      dockerfile: gbm-seg/Dockerfile
      network: host   # lets pip reach localhost proxy during build
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
    image: brain-lesion-gbm-seg:demo
    ports:
      - "5000:5000"
    environment:
      - WEIGHTS_PATH=/app/weights
      - DEVICE=cuda
    volumes:
      - ./demo_workspace:/workspace:rw
      - /home:/home:rw
      - ./services/gbm-seg/nnUNetv1_data:/app/nnUNetv1_data:ro
      - ./services/gbm-seg/nnUNetv2_data:/app/nnUNetv2_data:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["full", "gpu"]
  # MS lesion segmentation service (nnUNet v2 + CATMIL trainer from luumsk/SmallLesionMRI)
  service-ms-seg:
    build:
      context: ./services
      dockerfile: ms-seg/Dockerfile
      network: host   # lets pip reach localhost proxy during build
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
    image: brain-lesion-ms-seg:demo
    ports:
      - "5001:5001"
    environment:
      - DEVICE=cuda
    volumes:
      - ./demo_workspace:/workspace:rw
      - /home:/home:rw                                              # match other services
      - ./services/ms-seg/nnUNet_results:/app/nnUNet_results:ro     # CATMIL weights (read-only)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["full", "gpu"]
services:
  # Сервис 1: веб-интерфейс + бэкенд + препроцессинг
  web:
    build:
      context: .
      dockerfile: web.Dockerfile
    image: brain-lesion-web:demo
    ports:
      - "8000:8000"  # Только один порт - фронтенд и API на 8000
    environment:
      - SEGMENTATION_URL=http://segmentation:5000  # ← Исправлено с :8080 на :5000
      - FSLDIR=${FSLDIR:-/usr/local/fsl}  # Путь к FSL в образе
    volumes:
        - /home:/home:rw              # Вся домашняя директория
        - ./demo_workspace:/workspace:rw  # Локальная папка
        - ./scripts:/app/scripts:ro
        - ./configs:/app/configs:rw
        - ./backend/brain_lesion.db:/app/backend/brain_lesion.db:rw
    depends_on:
      - segmentation
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["full"]
  
  # Сервис 2: сегментация на GPU
  segmentation:
    build:
      context: ./segmentation
      dockerfile: Dockerfile
    image: brain-lesion-segmentation:demo
    ports:
      - "5000:5000"  # ← Исправлено с 8080 на 5000
    environment:
      - WEIGHTS_PATH=/app/weights
      - DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["full", "gpu"]
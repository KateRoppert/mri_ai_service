services:

  # Web frontend + backend + preprocessing pipeline
  web:
    build:
      context: .
      dockerfile: web.Dockerfile
    image: brain-lesion-web:demo
    ports:
      - "8000:8000"
    environment:
      - SEGMENTATION_URL=http://service-gbm-seg:5000
      - FSLDIR=${FSLDIR:-/usr/local/fsl}
    volumes:
      - /home:/home:rw
      - ./demo_workspace:/workspace:rw
      - ./scripts:/app/scripts:ro
      - ./configs:/app/configs:rw
      - ./backend/brain_lesion.db:/app/backend/brain_lesion.db:rw
    depends_on:
      - service-gbm-seg
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["full"]

  # GBM segmentation service (nnUNet v1, Task115)
  service-gbm-seg:
    build:
      context: ./services/gbm-seg
      dockerfile: Dockerfile
    image: brain-lesion-gbm-seg:demo
    ports:
      - "5000:5000"
    environment:
      - WEIGHTS_PATH=/app/weights
      - DEVICE=cuda
    volumes:
      - ./demo_workspace:/workspace:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["full", "gpu"]
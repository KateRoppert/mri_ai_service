# ============================================
# MASTER PIPELINE CONFIGURATION
# ============================================

# Общие настройки
general:
  root_input_dir: /mnt/datastorage/nbia/nbia/manifest-1669766397961/UPENN-GBM
  root_output_dir: /media/ssd/roppert/UPENN-GBM_preprocessed_5
  max_subjects: null                    # null = все субъекты, или число для теста
  skip_existing: true                   # Глобальное возобновление прерванной работы
  benchmark_results_dir: /media/ssd/roppert/UPENN-GBM_preprocessed_5/benchmark_results
  lesion_type: glioblastoma             # default for manual runs (web overrides this per-request)

# Структура поддиректорий внутри root_output_dir
output_structure:
  stage_01: bids_organized
  stage_02: metadata
  stage_03: nifti
  stage_04: quality_reports
  stage_05_data: preprocessed
  stage_06: segmentation
  stage_07: segmentation    # native masks saved alongside atlas masks
  stage_08: segmentation    # lobar reports saved alongside masks
  logs: logs
  reports: reports

# Параллельное выполнение этапов (по умолчанию выключено)
parallel_stages:
  enabled: false
  groups:
    - [2, 3]  # Этапы 2 и 3 могут выполняться параллельно

# ============================================
# КОНФИГУРАЦИЯ ЭТАПОВ
# ============================================

stages:
  stage_01_reorganize:
    enabled: true
    script: scripts/01_reorganize_folders.py
    args:
      config: configs/dicom_tags.yaml
      metadata-dir: metadata
      mode: parallel
      workers: 8
      dry_run: false
      force: false
      benchmark: false
      batch_size: null
      max_subjects: null
      validate: false  # Пока не реализовано
      results_dir: /media/ssd/roppert/UPENN-GBM_preprocessed_4/benchmark_results/stage_01

  stage_02_metadata:
    enabled: false
    # WARNING: Do not run on anonymized BIDS data — tags already stripped.
    # Use only for validation on original data or to re-extract from metadata/ JSONs.
    script: scripts/metadata_extractor.py
    args:
      config: configs/dicom_tags.yaml
      mode: parallel 
      workers: 14
      force: false
      benchmark: false
      max_subjects: null
      validate: false  # Пока не реализовано
      results_dir: /media/ssd/roppert/UPENN-GBM_preprocessed_4/benchmark_results/stage_02

  stage_03_convert:
    enabled: true
    script: scripts/03_convert_to_nifti.py
    args:
      mode: parallel
      workers: 8
      force: false
      benchmark: false
      max_subjects: null
      validate: false  # Пока не реализовано
      results_dir: /media/ssd/roppert/UPENN-GBM_preprocessed_4/benchmark_results/stage_03

  stage_04_quality:
    enabled: true
    script: scripts/04_assess_quality.py
    args:
      config: configs/quality_config.yaml
      input-format: bids
      mode: parallel
      workers: 6                            # ~2.1 GB/worker measured on SibBMS 0.35mm volumes after float32+in-place fixes (was ~7.6 GB → OOM at 12); 6*2.1=12.6 GB fits the 20g container cap
      skip-existing: true
      force: false
      benchmark: false
      max_subjects: null
      results_dir: /media/ssd/roppert/UPENN-GBM_preprocessed_4/benchmark_results/stage_04

  stage_05_preprocessing:
    enabled: true
    script: scripts/05_preprocessing.py
    args:
      config: configs/preprocessing_config.yaml
      mode: parallel
      workers: 4                            # ~2.9 GB/worker measured on SibBMS 0.35mm (6 workers took 17.6 of the 20g cap and spilled 2.1 GB into swap — passed, but no margin); 4*2.9=11.7 GB. See KI-042
      skip-existing: true
      benchmark: false
      validate: true
      max_subjects: null
      results_dir: /media/ssd/roppert/UPENN-GBM_preprocessed_4/benchmark_results/stage_05

  stage_06_segmentation:
    enabled: true
    script: scripts/06_segmentation.py
    args:
      config: configs/segmentation_config.yaml
      console-log-level: INFO
      max-concurrent: 2
      skip-existing: true
      benchmark: false
      validate: true
      server_name: null
      gpu_count: null
      gpu_ids: null
      max_subjects: null
      results-dir: /media/ssd/roppert/UPENN-GBM_preprocessed_4/benchmark_results/stage_06

  stage_07_inverse_transform:
    enabled: true
    script: scripts/07_inverse_transform.py
    args:
      mode: parallel
      workers: 2                            # ~6 GB/worker on SibBMS 0.35mm (ANTs holds native reference + warped output per modality); 5 workers hit the 20g cap -> cgroup OOM -> BrokenProcessPool, all 11 sessions failed. 2*6=12 GB. The stage auto-tuner caps by CPU only and is memory-blind — see KI-042
      skip-existing: true
      benchmark: false
      max_subjects: null
      reference-modality: t1
      results_dir: /media/ssd/roppert/UPENN-GBM_preprocessed_4/benchmark_results/stage_07

  stage_08_anatomical_analysis:
    enabled: true
    script: scripts/08_anatomical_analysis.py
    args:
      config: configs/lobar_atlas_config.yaml
      preprocessing-config: configs/preprocessing_config.yaml
      ms-zones-config: configs/ms_zones_config.yaml
      mode: parallel
      workers: 8
      skip-existing: true
      benchmark: false
      max_subjects: null
      results_dir: /media/ssd/roppert/UPENN-GBM_preprocessed_4/benchmark_results/stage_08

# ============================================
# НАСТРОЙКИ ОТЧЕТНОСТИ
# ============================================
reporting:
  enabled: true
  formats:
    - json
    - html
    - txt
  include:
    - timing
    - throughput
    - errors
    - completion
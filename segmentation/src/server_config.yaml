# ========================================================================
# Server Configuration for simple_server.py
# ========================================================================
# This configuration file defines paths and settings for the segmentation
# server. It should be placed in the same directory as simple_server.py
# or its path can be specified via SERVER_CONFIG environment variable.
#
# Usage:
#   python simple_server.py
#   # The script will automatically load this config
#
# Or specify custom config location:
#   export SERVER_CONFIG=/path/to/custom_config.yaml
#   python simple_server.py
# ========================================================================

server:
  # ======================================================================
  # nnUNet Paths Configuration
  # ======================================================================
  
  # Path to nnUNet source code directory
  # This should contain the nnUNet Python package
  nnunet_path: "/media/ssd/roppert/segmentation_server/nnUNet"
  
  # Path to nnUNet v1 data directory (RESULTS_FOLDER)
  # This should contain:
  #   - nnUNet/3d_fullres/TaskXXX/.../fold_X/
  #   - Trained model weights
  nnunet_models: "/media/ssd/roppert/segmentation_server/nnUNetv1_data"
  
  # ======================================================================
  # Model Configuration
  # ======================================================================
  
  # Task name to use for inference
  # This corresponds to the trained model directory:
  # {nnunet_models}/nnUNet/3d_fullres/{task_name}/nnUNetTrainerV2__nnUNetPlansv2.1/
  task_name: "Task115_AllData5foldsMeta"
  
  # ======================================================================
  # GPU Configuration
  # ======================================================================
  
  # List of GPU IDs to use for inference
  # The server will distribute tasks across these GPUs
  # Examples:
  #   - Single GPU:   [0]
  #   - Multiple GPUs: [0, 1, 2]
  #   - Skip GPU 3:   [0, 1, 2]  (if GPU 3 has issues)
  gpu_ids: [0]
  
  # ======================================================================
  # Server Network Settings
  # ======================================================================
  
  # Host to bind the server to
  # "0.0.0.0" - accessible from any network interface (default for servers)
  # "127.0.0.1" or "localhost" - only accessible locally
  host: "0.0.0.0"
  
  # Port to listen on
  port: 5000
  
  # Enable debug mode (verbose logging, auto-reload on code changes)
  # Set to false for production
  debug: true
  
  # ======================================================================
  # Directory Configuration
  # ======================================================================
  
  # These directories are created relative to simple_server.py location
  # You typically don't need to change these unless you have specific
  # requirements for data organization
  
  # Input directory for uploaded NIfTI files
  # Relative path from simple_server.py: ../data/input
  input_dir: "data/input"
  
  # Output directory for segmentation results
  # Relative path from simple_server.py: ../data/output
  output_dir: "data/output"
  
  # Temporary directory for processing
  # Relative path from simple_server.py: ../data/tmp
  tmp_dir: "data/tmp"
  
  # ======================================================================
  # Processing Configuration
  # ======================================================================
  
  # Maximum number of parallel segmentation tasks
  # Should not exceed the number of available GPUs
  max_parallel_tasks: 1
  
  # Timeout for individual segmentation tasks (seconds)
  task_timeout: 600
  
  # Maximum upload file size (bytes)
  # Default: 1GB (1024 * 1000 * 1000)
  max_content_length: 1024000000


# ========================================================================

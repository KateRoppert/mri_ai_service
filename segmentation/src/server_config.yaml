# ========================================================================
# Validation Checklist
# ========================================================================
# Before starting the server, verify:
# 
# 1. nnunet_path exists and contains nnUNet Python package
#    Check: ls {nnunet_path}/nnunet/
# 
# 2. nnunet_models exists and contains trained models
#    Check: ls {nnunet_models}/nnUNet/3d_fullres/{task_name}/
# 
# 3. Model checkpoint files exist
#    Check: ls {nnunet_models}/nnUNet/3d_fullres/{task_name}/nnUNetTrainerV2__nnUNetPlansv2.1/fold_*/model_final_checkpoint.model
# 
# 4. GPU IDs are valid for your system
#    Check: nvidia-smi
# 
# 5. Port is not already in use
#    Check: netstat -tuln | grep {port}
# 
# 6. Directories will be created automatically:
#    - data/input/
#    - data/output/
#    - data/tmp/
# ========================================================================
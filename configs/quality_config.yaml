# Scoring weights (sum = 1.0)
weights:
  snr: 0.20                      # Signal-to-noise ratio
  cnr: 0.20                      # Contrast-to-noise ratio  
  efc: 0.15                      # Entropy focus criterion
  fber: 0.15                     # Foreground-background energy ratio
  gradient_sharpness: 0.15       # Image sharpness
  voxel_anisotropy: 0.05         # Voxel uniformity
  intensity_variance: 0.05       # Intensity distribution
  coefficient_of_variation: 0.05 # Signal stability

# Quality categories (based on final score 0-100)
categories:
  good:
    min: 80
    max: 100
  acceptable:
    min: 50
    max: 79
  poor:
    min: 0
    max: 49

# Foreground mask parameters
foreground_mask:
  method: "otsu"           # Options: "otsu", "percentile"
  percentile_threshold: 5  # If using percentile method
# Quality Assessment Configuration
# Thresholds and weights for quality metrics

# Thresholds per modality
thresholds:
  t1:
    snr:
      good: 15.0
      acceptable: 10.0
      poor: 5.0
    cnr:
      good: 8.0
      acceptable: 5.0
      poor: 2.0
    efc:
      good: 0.5    # Lower is better (less entropy = sharper)
      acceptable: 0.6
      poor: 0.7
    fber:
      good: 50.0   # Higher is better (better foreground/background ratio)
      acceptable: 25.0
      poor: 10.0
    gradient_sharpness:
      good: 1000.0  # Higher is better (sharper gradients)
      acceptable: 500.0
      poor: 200.0
    voxel_anisotropy:
      good: 1.2     # Lower is better (closer to 1.0 = isotropic)
      acceptable: 2.0
      poor: 3.0
    intensity_variance:
      good: 5000.0  # Higher is better (good contrast)
      acceptable: 2000.0
      poor: 500.0
    coefficient_of_variation:
      good: 0.15    # Lower is better (stable signal)
      acceptable: 0.25
      poor: 0.40
  
